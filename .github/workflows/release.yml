name: Release

# A single rolling release tagged "latest" is updated on every push to main
# that touches code (doc-only pushes are ignored). It is recreated at the newest
# commit and marked --latest, so install.sh's releases/latest lookup always
# resolves to it. The binary self-identifies with a datestring version baked in
# via -ldflags, so `mm --version` tells you exactly which build you're on.
#
# To cut a permanent, versioned release, run this workflow manually
# (workflow_dispatch) and pass a tag like v1.0.0.

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Permanent release tag (e.g. v1.0.0). Blank = update rolling "latest".'
        required: false

permissions:
  contents: write

# Serialize releases so two quick pushes can't recreate "latest" concurrently.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      # Gate the release on a green build + tests so a broken push to main
      # never ships an auto-release.
      - name: Vet and test
        run: |
          go vet ./...
          go test ./...

      - name: Compute version
        run: |
          set -euo pipefail
          SHA="$(git rev-parse --short HEAD)"
          DATE="$(date -u +'%Y.%m.%d-%H%M%S')"
          TAGIN="${{ github.event.inputs.tag }}"
          if [ -n "$TAGIN" ]; then
            # Manual, permanent versioned release.
            echo "REL_TAG=$TAGIN" >> "$GITHUB_ENV"
            echo "VERSION=$TAGIN"  >> "$GITHUB_ENV"
            echo "ROLLING=false"   >> "$GITHUB_ENV"
            echo "Releasing permanent $TAGIN"
          else
            # Rolling "latest"; binary version is a datestring for traceability.
            echo "REL_TAG=latest"          >> "$GITHUB_ENV"
            echo "VERSION=v${DATE}-${SHA}"  >> "$GITHUB_ENV"
            echo "ROLLING=true"            >> "$GITHUB_ENV"
            echo "Updating rolling latest -> v${DATE}-${SHA}"
          fi

      - name: Build cross-platform binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${t%/*}"; arch="${t#*/}"
            out="dist/mm_${os}_${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$out" .
          done
          cp config.default.json dist/
          ls -la dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$ROLLING" = "true" ]; then
            # Recreate the single "latest" release so its tag points at the
            # newest commit and its assets are the fresh build.
            gh release delete "$REL_TAG" --yes --cleanup-tag 2>/dev/null || true
            gh release create "$REL_TAG" dist/* \
              --title "latest ($VERSION)" \
              --notes "Rolling build of main ($VERSION), updated automatically on every code push." \
              --target "$GITHUB_SHA" \
              --latest
          else
            if gh release view "$REL_TAG" >/dev/null 2>&1; then
              gh release upload "$REL_TAG" dist/* --clobber
            else
              gh release create "$REL_TAG" dist/* \
                --title "$REL_TAG" --generate-notes --target "$GITHUB_SHA" --latest
            fi
          fi
