name: Release

# Releases are automatic: every push to main builds cross-platform `mm`
# binaries and publishes a GitHub Release whose tag/version is a datestring
# (e.g. v2026.06.28-190843-abc1234), so there's nothing to bump by hand.
# Pushing an explicit v* tag, or running this workflow manually, still works.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (blank = auto datestring)'
        required: false

permissions:
  contents: write

# Don't pile up overlapping releases if several pushes land quickly.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      # Gate the release on a green build + tests so a broken push to main
      # never ships an auto-release.
      - name: Vet and test
        run: |
          go vet ./...
          go test ./...

      - name: Compute version
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            V="${{ github.event.inputs.tag }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME}"
          else
            V="v$(date -u +'%Y.%m.%d-%H%M%S')-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$V" >> "$GITHUB_ENV"
          echo "Releasing $V"

      - name: Build cross-platform binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${t%/*}"; arch="${t#*/}"
            out="dist/mm_${os}_${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$out" .
          done
          cp config.default.json dist/
          ls -la dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Releasing $VERSION"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/* --clobber
          else
            gh release create "$VERSION" dist/* \
              --title "$VERSION" --generate-notes --target "$GITHUB_SHA"
          fi
