name: Release

# Cut a release by pushing a version tag:  git tag v0.2.0 && git push origin v0.2.0
# (or run this workflow manually and pass the tag). It cross-compiles `mm` for
# the common platforms and attaches the binaries to a GitHub Release, so users
# can install without a Go toolchain.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Build cross-platform binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${t%/*}"; arch="${t#*/}"
            out="dist/mm_${os}_${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w" -o "$out" .
          done
          cp config.default.json dist/
          ls -la dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.tag }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME}"
          echo "Releasing $VERSION"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/* --clobber
          else
            gh release create "$VERSION" dist/* --title "$VERSION" --generate-notes
          fi
