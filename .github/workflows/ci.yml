name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Drop local replacements for CI
      run: |
        go mod edit \
          -dropreplace charm.land/bubbletea/v2 \
          -dropreplace charm.land/lipgloss/v2 \
          -dropreplace charm.land/bubbles/v2 \
          -dropreplace github.com/charmbracelet/harmonica \
          -dropreplace github.com/lrstanley/bubblezone/v2 \
          -dropreplace github.com/coder/acp-go-sdk
        go mod tidy

    - name: Build
      run: go build -v -o mm main.go

    - name: Test
      run: go test -v ./...
