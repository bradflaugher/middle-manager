name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'

    - name: Build
      run: go build -v ./...

    - name: Vet
      run: go vet ./...

    - name: Test
      run: go test -v ./...

    - name: Cross-compile (darwin/windows)
      run: |
        GOOS=darwin  GOARCH=arm64 go build -o /dev/null .
        GOOS=windows GOARCH=amd64 go build -o /dev/null .
